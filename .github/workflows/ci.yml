  sync-static-analysis:
    needs: gate
    if: always() && (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    permissions: # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#permissions
      contents: read # read repo
      pull-requests: write # post comments
    runs-on:
      - self-hosted
      - Linux
      - X64
    env:
      WORK_DIR: ${{ github.workspace }}/runs/${{ github.run_id }}
    steps:
      - name: Cleanup runs older than 24 hours
        run: |
          find ${{ github.workspace }}/runs -maxdepth 1 -type d -mtime +1 -exec rm -rf {} + 2>/dev/null || true

      - name: Setup workspace
        run: |
          mkdir -p ${{ env.WORK_DIR }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: ${{ env.WORK_DIR }}/repo
          clean: true

      - name: Run static analysis (sandboxed in VMs)
        working-directory: ${{ env.WORK_DIR }}/repo
        run: |
          virtci run test/virtci/static_analysis.yml

      - name: Clang-Tidy Results
        if: always()
        working-directory: ${{ env.WORK_DIR }}/repo
        run: |
          if [ -f build/clang-tidy-report.txt ]; then
            grep -E "warning:|error:" build/clang-tidy-report.txt | head -20 | while IFS= read -r line; do
              echo "::warning::clang-tidy: $line"
            done || true

            WARNING_COUNT=$(grep -c "warning:" build/clang-tidy-report.txt || true)
            ERROR_COUNT=$(grep -c "error:" build/clang-tidy-report.txt || true)
            WARNING_COUNT=${WARNING_COUNT:-0}
            ERROR_COUNT=${ERROR_COUNT:-0}

            echo "CLANG_TIDY_WARNINGS=$WARNING_COUNT" >> $GITHUB_ENV
            echo "CLANG_TIDY_ERRORS=$ERROR_COUNT" >> $GITHUB_ENV
          fi

      - name: Cppcheck Results
        if: always()
        working-directory: ${{ env.WORK_DIR }}/repo
        run: |
          if [ -f build/cppcheck-report.txt ]; then
            grep -E "error|warning|style|performance|portability" build/cppcheck-report.txt | head -20 | while IFS= read -r line; do
              echo "::warning::cppcheck: $line"
            done || true

            if [ -f build/cppcheck-report.xml ]; then
              ISSUE_COUNT=$(grep -c "<error " build/cppcheck-report.xml || true)
              ISSUE_COUNT=${ISSUE_COUNT:-0}
              echo "CPPCHECK_ISSUES=$ISSUE_COUNT" >> $GITHUB_ENV
            fi
          fi

      - name: Post Summary
        if: always() && github.event_name == 'pull_request'
        working-directory: ${{ env.WORK_DIR }}/repo
        run: |
          SUMMARY="## Static Analysis Results\n\n"
          SUMMARY+="### Clang-Tidy\n"
          SUMMARY+="- Errors: ${CLANG_TIDY_ERRORS:-0}\n"
          SUMMARY+="- Warnings: ${CLANG_TIDY_WARNINGS:-0}\n\n"
          SUMMARY+="### Cppcheck\n"
          SUMMARY+="- Issues: ${CPPCHECK_ISSUES:-0}\n\n"
          SUMMARY+="For the full reports, see the artifacts"

          echo -e "$SUMMARY" | gh pr comment ${{ github.event.pull_request.number }} --body-file -
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Upload analysis reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: static-analysis-reports-${{ github.run_id }}
          path: |
            ${{ env.WORK_DIR }}/repo/build/clang-tidy-report.txt
            ${{ env.WORK_DIR }}/repo/build/cppcheck-report.xml
            ${{ env.WORK_DIR }}/repo/build/cppcheck-report.txt

  sync-llm-analysis:
    needs: gate
    if: always() && (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    runs-on:
      - self-hosted
      - Linux
      - X64
    timeout-minutes: 20
    continue-on-error: true
    permissions: # https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#permissions
      contents: read # read repo
      pull-requests: write # post comments
    concurrency:
      group: sync-llm-ollama-mac
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Generate diff
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            git diff origin/${{ github.base_ref }}...HEAD > diff.txt
          else
            git diff HEAD~1 > diff.txt
          fi

      - name: Pull opencode image
        run: docker pull -q ghcr.io/anomalyco/opencode:latest

      - name: Run opencode Review
        id: llm_analysis
        continue-on-error: true
        env:
          # https://opencode.ai/docs/config/ -- no GITHUB_TOKEN in container; diff is pre-generated at /workspace/diff.txt
          # --network none cannot be used: Ollama requires host.docker.internal connectivity.
          # All other available isolation is applied instead.
          # https://github.com/anomalyco/opencode
          OPENCODE_CONFIG_CONTENT: '{"$schema":"https://opencode.ai/config.json","provider":{"ollama":{"npm":"@ai-sdk/openai-compatible","name":"Ollama","options":{"baseURL":"http://host.docker.internal:11434/v1"},"models":{"qwen3.5:27b":{"name":"Qwen 3.5 27B"}}}},"permission":{"read":"allow","glob":"allow","grep":"allow","list":"allow","lsp":"allow","codesearch":"allow","edit":"deny","bash":"deny","task":"deny","skill":"deny","webfetch":"deny","websearch":"deny","question":"deny","external_directory":"deny","doom_loop":"deny"}}'
          CONTAINER_NAME: sync-opencode-review-${{ github.run_id }}
        run: |
          set +e
          timeout --preserve-status --signal=TERM --kill-after=30s 1140 \
            docker run --rm --name "$CONTAINER_NAME" \
              --add-host=host.docker.internal:host-gateway \
              --user 65534:65534 \
              --cap-drop ALL \
              --security-opt no-new-privileges:true \
              --read-only \
              --tmpfs /tmp:rw,nosuid,size=2g,mode=1777 \
              --pids-limit 64 \
              --memory 4g \
              -v "${{ github.workspace }}:/workspace:ro" \
              -w /workspace \
              -e HOME=/tmp \
              -e XDG_DATA_HOME=/tmp/.local/share \
              -e OPENCODE_CONFIG_CONTENT \
              ghcr.io/anomalyco/opencode:latest \
              run \
                "You are a software development expert reviewing the Sync Programming Language C++ library: an embeddable language runtime for host applications in C, C++, Rust, or Zig, focused on allowing scriptable multithreading. Read ./diff.txt for the changes. Before forming conclusions, read header files referenced by changed sources from ./. Constraints do not flag as issues: no C++ exceptions (-fno-exceptions is intentional), custom memory allocators throughout (placement new and custom allocator patterns are by design), deterministic low-level memory control is a design goal. Focus only on: logic errors, data races, undefined behavior (pointer aliasing/OOB/signed overflow/UAF/uninit reads), API contract violations, platform portability (endianness/alignment/ABI), memory leaks outside the custom allocator, incorrect error propagation. Do not report: missing exception handling, RAII suggestions, standard library alternatives, naming, formatting, or generic C++ best practices. Output exactly these sections: ## Critical Issues, ## Potential Issues, ## Suggestions, ## Summary. Cite file:line for each finding. Write None found for empty sections." \
              --model ollama/qwen3.5:27b \
            2>&1 | tee llm-analysis-raw.md
          EXIT=${PIPESTATUS[0]}
          echo "opencode exit code: $EXIT"
          if [ "$EXIT" = "143" ] || [ "$EXIT" = "124" ]; then
            echo "::warning::opencode timed out (exit $EXIT)"
          fi
          echo "llm_exit=$EXIT" >> "$GITHUB_OUTPUT"

      - name: Generate report
        if: always()
        run: |
          touch llm-analysis-raw.md
          echo "raw output size: $(wc -c < llm-analysis-raw.md) bytes"

          if grep -q '^## Critical Issues' llm-analysis-raw.md; then
            sed -n '/^## Critical Issues/,$p' llm-analysis-raw.md > llm-analysis.md
          else
            {
              echo "## LLM Analysis (structured report not produced)"
              echo ""
              echo "The model did not output the expected sections"
              echo ""
              echo "- exit code: \`${{ steps.llm_analysis.outputs.llm_exit }}\`"
              echo ""
              echo "Raw output tail:"
              echo ""
              echo '```'
              tail -c 4000 llm-analysis-raw.md
              echo '```'
            } > llm-analysis.md
          fi

      - name: Show raw opencode output
        if: always()
        run: cat llm-analysis-raw.md

      - name: Cleanup container
        if: always()
        run: docker rm -f "sync-opencode-review-${{ github.run_id }}" 2>/dev/null || true

      - name: Post PR Comment
        if: github.event_name == 'pull_request' && steps.llm_analysis.outcome == 'success'
        continue-on-error: true
        run: gh pr comment ${{ github.event.pull_request.number }} --body-file llm-analysis.md
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Add to Job Summary
        if: always()
        continue-on-error: true
        run: |
          cat llm-analysis.md >> "$GITHUB_STEP_SUMMARY"
          {
            echo ""
            echo "<details><summary>Raw opencode output</summary>"
            echo ""
            echo '```'
            cat llm-analysis-raw.md
            echo '```'
            echo ""
            echo "</details>"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Analysis Artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: llm-analysis-${{ github.run_id }}
          path: |
            llm-analysis.md
            llm-analysis-raw.md
          if-no-files-found: ignore

      - name: Post Warning on Failure
        if: always() && steps.llm_analysis.outcome != 'success'
        continue-on-error: true
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            gh pr comment ${{ github.event.pull_request.number }} --body "**LLM Analysis Warning**: The analysis didn't complete (timeout or Ollama unavailable). This is non-blocking and doesn't affect PR approval."
          else
            echo "::warning::LLM analysis didn't complete for this ${{ github.event_name }} event."
          fi
        env:
          GH_TOKEN: ${{ github.token }}
