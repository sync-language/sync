name: "CI"

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # Needs manual approval before it can run.
  # Skipped for push and workflow_dispatch.
  gate:
    if: github.event_name == 'pull_request'
    environment: ci-protected
    runs-on: ubuntu-latest
    steps:
      - name: Approved
        run: echo "CI approved"

  test-ubuntu-x64:
    needs: gate
    if: always() && (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    runs-on:
      - self-hosted
      - Linux
      - X64
    env:
      WORK_DIR: ${{ github.workspace }}/runs/${{ github.run_id }}
    steps:
      - name: Cleanup runs older than 24 hours
        run: |
          find ${{ github.workspace }}/runs -maxdepth 1 -type d -mtime +1 -exec rm -rf {} + 2>/dev/null || true

      - name: Setup workspace
        run: |
          mkdir -p ${{ env.WORK_DIR }}
          cd ${{ env.WORK_DIR }}

      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          path: ${{ env.WORK_DIR }}/repo
          clean: true

      - name: Run Ubuntu VirtCI tests
        working-directory: ${{ env.WORK_DIR }}/repo
        run: virtci run test/virtci/ubuntu_x64.yml

  test-ubuntu-arm64:
    needs: gate
    if: always() && (needs.gate.result == 'success' || needs.gate.result == 'skipped')
    runs-on:
      - self-hosted
      - macOS
      - ARM64
    env:
      WORK_DIR: ${{ github.workspace }}/runs/${{ github.run_id }}
    steps:
