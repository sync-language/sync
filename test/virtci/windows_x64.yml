windows-x64:
  image: win-11-x64
  cpus: 2
  memory: 8G
  steps:
    - name: Make Dirs
      run: mkdir sync

    - name: Copy Files
      copy:
        from: ./
        to: vm:C:\Users\dev\sync
        exclude:
          - .git
          - .github
          - docs

    - name: Install Ninja
      run: choco install -y ninja --force --no-progress --install-arguments '/Quiet'

    - name: Run Subsequent Steps Offline
      offline: true

    - name: Configure CMake Visual Studio
      run: cmake -S sync -B build_vs -G "Visual Studio 18 2026" -DCMAKE_BUILD_TYPE=Debug -DSYNC_LIB_WITH_TESTS=ON

    - name: Build CMake Visual Studio
      run: cmake --build build_vs -j2

    - name: Run CTest Visual Studio
      run: ctest --test-dir build_vs --output-on-failure -C Debug

    - name: Configure CMake Clang-cl ASan
      run: cmake -S sync -B build_clang_cl_asan --preset win-clang-cl-debug-cov-asan

    - name: Build CMake Clang-cl ASan
      run: cmake --build build_clang_cl_asan -j2

    - name: Run CTest Clang-cl ASan
      run: ctest --test-dir build_clang_cl_asan --output-on-failure -C Debug

    - name: Configure CMake MinGW
      run: cmake -S sync -B build-mingw -G "Unix Makefiles" -DCMAKE_C_COMPILER=gcc -DCMAKE_CXX_COMPILER=g++ -DCMAKE_BUILD_TYPE=Debug -DSYNC_LIB_WITH_TESTS=ON

    - name: Build CMake MinGW
      run: cmake --build build-mingw -j2

    - name: Run CTest MinGW
      run: ctest --test-dir build-mingw --output-on-failure -C Debug
