ubuntu-x64:
  image: ubuntu-server-x64
  cpus: 2
  memory: 6G
  steps:
    - name: Copy Files
      copy:
        from: ./
        to: vm:~/
        exclude:
          - .git
          - .github
          - docs

    - name: Install APT Dependencies
      run: sudo apt-get install -y build-essential cmake perl perl-modules libjson-perl libcapture-tiny-perl libdatetime-perl libtimedate-perl wget

    - name: Install LCOV
      run: |
        wget https://github.com/linux-test-project/lcov/releases/download/v2.4/lcov-2.4.tar.gz
        tar xf lcov-2.4.tar.gz
        make -C lcov-2.4 install
        rm -rf lcov-2.4 lcov-2.4.tar.gz

    - name: Run Subsequent Steps Offline
      offline: true

    - name: Configure CMake ASan
      run: cmake -S . -B build_asan_cov --preset linux-debug-cov-asan

    - name: Build CMake ASan
      run: cmake --build build_asan_cov -j2

    - name: Run CTest ASan
      run: ctest --test-dir build_asan_cov --output-on-failure

    - name: Configure CMake TSan
      run: cmake -S . -B build_tsan --preset linux-dev-tsan

    - name: Build CMake TSan
      run: cmake --build build_tsan -j2

    - name: Run CTest TSan
      run: |
        setarch $(uname -m) -R ./build_tsan/test/NewTests
        ctest --test-dir build_tsan --output-on-failure

    - name: Configure CMake Release
      run: cmake -S . -B build_rel  -DCMAKE_BUILD_TYPE=Release -DSYNC_LIB_WITH_TESTS=ON -DSYNC_LIB_DOCTEST_ADD_CTESTS=OFF -DSYNC_SKIP_TSAN_TESTS=ON -DSYNC_LIB_ASAN=OFF -DSYNC_LIB_TSAN=OFF -DSYNC_LIB_CODE_COVERAGE=ON

    - name: Build CMake Release
      run: cmake --build build_rel -j2

    - name: Run CTest Release
      run: ctest --test-dir build_rel --output-on-failure

    - name: LCOV Capture
      run: |
        lcov --capture --directory build_asan_cov --output-file reports/linux_x64/coverage_asan.info --branch-coverage --ignore-errors negative,negative,inconsistent,inconsistent,mismatch,mismatch,gcov,gcov --exclude '*/doctest.h'
        lcov --capture --directory build_rel --output-file reports/linux_x64/coverage_rel.info --branch-coverage --ignore-errors negative,negative,inconsistent,inconsistent,mismatch,mismatch,gcov,gcov --exclude '*/doctest.h'

    - name: LCOV Merge
      run: lcov -a reports/linux_x64/coverage_asan.info -a reports/linux_x64/coverage_rel.info --output-file reports/linux_x64/coverage.info --branch-coverage --rc no_exception_branch=1 --ignore-errors inconsistent,inconsistent,corrupt,corrupt,mismatch,mismatch

    - name: LCOV HTML
      run: genhtml reports/linux_x64/coverage.info --branch-coverage --output-directory reports/linux_x64/html --ignore-errors inconsistent,inconsistent,corrupt,corrupt

    - name: Copy coverage.info to Host
      copy:
        from: ~/reports/linux_x64/coverage.info
        to: ./reports/linux_x64/

    - name: Copy HTML Coverage Report to Host
      copy:
        from: ~/reports/linux_x64/html/
        to: ./reports/linux_x64/html/
