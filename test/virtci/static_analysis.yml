cppcheck-x64:
  image: ubuntu-server-x64
  cpus: 4
  memory: 8G
  steps:
    - name: Copy source code to VM
      copy:
        from: ./
        to: vm:~/

    - name: Install cppcheck, cmake, python3
      run: |
        sudo apt-get update
        sudo apt-get install -y cppcheck cmake build-essential python3

    - name: Go offline for security
      offline: true

    - name: Configure CMake For compile_commands.json
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=Debug -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

    - name: Run cppcheck analysis
      run: |
        cppcheck \
          --project=build/compile_commands.json \
          --enable=warning,style,performance,portability \
          --suppress=missingIncludeSystem \
          -j $(nproc) \
          --xml --xml-version=2 \
          2> cppcheck-report.xml || true
      continue_on_error: true

    - name: Copy XML report to host
      copy:
        from: vm:~/cppcheck-report.xml
        to: ./build/cppcheck-report.xml

    - name: Display results summary
      run: |
        echo "=== Cppcheck Analysis Summary ==="
        grep -E "<error " $HOME/cppcheck-report.xml | wc -l
        echo "issues found. Reports copied to host."
      continue_on_error: true

